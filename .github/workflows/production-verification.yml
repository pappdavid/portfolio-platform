name: Production site verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  routes-and-content:
    runs-on: ubuntu-latest
    env:
      BASE: https://davidpapp.dev
    steps:
      - name: Verify routes, redirects, CV, and project content
        run: |
          set -euo pipefail
          ready=false
          for i in $(seq 1 60); do
            if curl -fsSL --max-time 30 "$BASE/" > /tmp/home.html && grep -q 'VoidArch Context' /tmp/home.html; then
              ready=true
              break
            fi
            sleep 10
          done
          [ "$ready" = true ]

          for path in / /projects /brand /security /privacy-policy /terms-of-service /cv.pdf; do
            code=$(curl -s -o /dev/null -m 30 -L -w '%{http_code}' "$BASE$path")
            echo "$path -> $code"
            [ "$code" = 200 ]
          done
          for path in /saas-projects /mcp /training /chat /projects/mcp-sentinel /projects/rag-chat /projects/training /projects/portfolio /about; do
            code=$(curl -s -o /dev/null -m 30 -w '%{http_code}' "$BASE$path")
            echo "$path -> $code"
            [ "$code" = 307 ] || [ "$code" = 308 ]
          done

          curl -sfI "$BASE/cv.pdf" | grep -qi 'content-type: application/pdf'
          bytes=$(curl -sf "$BASE/cv.pdf" | wc -c)
          echo "cv.pdf bytes: $bytes"
          [ "$bytes" -gt 20000 ]

          curl -fsSL "$BASE/projects" > /tmp/projects.html
          for name in 'VoidArch Context' 'VoidArch Studio' 'AgentSec Suite' 'saas-core'; do
            echo "checking $name"
            grep -q "$name" /tmp/home.html
            grep -q "$name" /tmp/projects.html
          done
          grep -q 'https://promptshield-cyan.vercel.app' /tmp/projects.html
          ! grep -Eqi 'thesys-c1-dashboard|THESYS_C1|voidarch-context-portal' /tmp/home.html /tmp/projects.html

  assistant-and-demo:
    runs-on: ubuntu-latest
    env:
      BASE: https://davidpapp.dev
    steps:
      - name: Verify deterministic project answer and integrated demo
        run: |
          set -euo pipefail
          curl -sf -H 'content-type: application/json' \
            -d '{"question":"What are David selected projects?"}' \
            "$BASE/api/ama" > /tmp/ama.json
          cat /tmp/ama.json
          python3 - <<'PY'
          import json
          data = json.load(open('/tmp/ama.json'))
          answer = data['answer'].lower()
          for name in ['voidarch context', 'voidarch studio', 'agentsec suite', 'saas-core']:
              assert name in answer, name
          assert isinstance(data.get('links'), list) and data['links']
          PY
          code=$(curl -s -o /dev/null -m 30 -L -w '%{http_code}' https://promptshield-cyan.vercel.app)
          echo "AgentSec demo -> $code"
          [ "$code" = 200 ]

  browser-rendering:
    runs-on: ubuntu-latest
    env:
      BASE: https://davidpapp.dev
    steps:
      - name: Verify rendered homepage and projects page
        run: |
          set -euo pipefail
          CHROME=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          "$CHROME" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage \
            --virtual-time-budget=8000 --dump-dom "$BASE/" > /tmp/home.html
          "$CHROME" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage \
            --virtual-time-budget=8000 --dump-dom "$BASE/projects" > /tmp/projects.html
          for name in 'VoidArch Context' 'VoidArch Studio' 'AgentSec Suite' 'saas-core'; do
            grep -q "$name" /tmp/home.html
            grep -q "$name" /tmp/projects.html
          done
          ! grep -Eqi 'Application error|Internal Server Error' /tmp/home.html /tmp/projects.html
